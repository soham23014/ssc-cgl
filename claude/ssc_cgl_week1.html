  id:"analogy", label:"Analogy",
  theory:`Analogy questions give you a pair of items connected by a hidden relationship, then ask you to find another pair connected by the SAME relationship. The whole question depends on you naming that relationship precisely — not vaguely.

There are four common types on SSC CGL. Semantic analogy links word meanings: worker-to-tool (Carpenter:Hammer), object-to-purpose (Pen:Write), or animal-to-young (Cow:Calf). Letter analogy links positions in the alphabet — for example BD:FH works because each letter shifts forward by 4 places (B→F, D→H), so you're doing arithmetic on letter positions, not looking at the letters themselves. Number analogy links numbers through a hidden operation — 3:9 works because 9=3², so the relationship is "squared," and that same squaring must apply to the second pair. Classification-style analogy links category membership — Rose is to Flower as Mango is to Fruit.

Worked example: "Fish : Water :: Bird : ?" — first name the relationship in plain words: "A fish LIVES IN water" (habitat relationship). Now test each option using that exact sentence: does a bird live in "Sky"? Yes — that's a direct habitat match, so Sky is correct. Notice how "Nest" is a trap — a nest is where a bird sleeps, not its natural habitat the way water is a fish's whole environment. The trap options in analogy always look plausible if you're vague about the relationship; naming it precisely is what filters them out.`,

{
  id:"classification", label:"Classification",
  theory:`Classification, also called "odd-one-out," gives you four items and asks which one doesn't belong with the other three. The trap is that the odd item usually LOOKS similar on the surface — it's a member of some related category, just not the SAME category as the other three.

Word-based classification tests category membership: Mango, Apple, Potato, Banana — three are fruits, Potato is a vegetable. The trick is that all four are "food" or "grow on plants," so a lazy read might miss it; you have to narrow to the most specific shared category among three of them. Letter-based classification checks structural patterns in a word or letter-group, like vowel-consonant count. Number-based classification usually hinges on one property: all-but-one being prime, all-but-one being a perfect square, or all-but-one being divisible by a specific number.

Worked example: "4, 9, 16, 20" — don't scan randomly. Test one property across all four: are they perfect squares? 4=2², 9=3², 16=4² — three fit. 20 is not a perfect square (nearest are 16 and 25). So 20 is the odd one. The method here is: pick ONE testable rule and check it against all four numbers systematically, rather than inspecting each number's random properties one at a time — that's what actually saves time under a 40-second limit.`,

    "If 3 options share two properties and 1 shares only one, that one is the answer."

{
  id:"series", label:"Series (Number)",
  theory:`Number series gives you a sequence of numbers following a hidden rule, and asks for the next (or missing) term. The entire skill is pattern-hunting in a structured way rather than guessing.

Start by computing the difference between every consecutive pair of terms. If that difference is constant (e.g. always +5), it's a simple arithmetic series. If the differences themselves form a pattern — say +3, +5, +7, +9 — that's a second-order pattern, meaning the "gap between gaps" grows steadily; this is extremely common in SSC papers. If terms are increasing by a constant multiplying factor (×2, ×3), it's geometric. Some series are built from perfect squares, cubes, or Fibonacci-style addition of the previous two terms. A smaller number of series alternate between two independent sub-series — odd positions follow one rule, even positions follow another.

Worked example: "3, 6, 11, 18, 26" — compute differences: 6-3=3, 11-6=5, 18-11=7. The differences are 3,5,7 — increasing by 2 each time. So the next difference should be 9. Apply it: 18+9=27, giving the next actual term after 18. The key discipline is: never commit to a pattern after checking only ONE difference — always confirm across at least three consecutive gaps before trusting it, because a single coincidental difference can mislead you into the wrong rule entirely.`,

    "Find the difference between consecutive terms first — if constant, it's arithmetic (AP).",
    "If differences are increasing/decreasing in a pattern (e.g. +2,+4,+6), find the pattern of differences.",

    "Try squares, cubes, or prime number sequences if simple differences don't work."
  ],

    "If differences look random, check second-order differences (differences of differences) — this reveals quadratic patterns.",
    "For alternating series, split into two separate series (1st,3rd,5th terms) and (2nd,4th,6th terms) and analyze each independently."
  ],

{
  id:"alphaseries", label:"Alphabet Series",
  theory:`Alphabet series works exactly like number series, except letters stand in for numbers via their position in the alphabet (A=1, B=2 ... Z=26). Every alphabet series question is secretly a number series question wearing a disguise — the moment you convert to numbers, the same difference-checking method from number series applies directly.

There are three common formats. Single-letter series gives one letter per step (B, D, F, H...) where you track the position difference (2,4,6,8 → gap of +2 each time). Letter-group series gives pairs or triplets per step (CE, FH, IK...) where you must track each position within the group separately — the first letters of each group form their own mini-series, and the second letters form another. Reverse alphabet series counts backward from Z (Z=1, Y=2, X=3...), which trips people up because they keep using forward positions out of habit.

Worked example: "B, E, H, K, ?" — convert to numbers: B=2, E=5, H=8, K=11. Differences: 5-2=3, 8-5=3, 11-8=3 — constant gap of +3. So the next position is 11+3=14, which converts back to the letter N. The single biggest time-saver here is memorizing reference points — E=5, J=10, O=15, T=20, Y=25 — so you're not counting from A every single time; you jump to the nearest known letter and count a short distance from there.`,

{
  id:"simplification", label:"Simplification",
  theory:`Simplification questions give you a numeric expression mixing brackets, multiplication, division, addition, subtraction, fractions and decimals, and ask you to reduce it to a single value. The entire topic is really about order-of-operations discipline plus calculation speed — there's rarely a "trick" that avoids doing the arithmetic, but there are tricks that make the arithmetic faster.

The order is BODMAS: Brackets first, then Of (meaning percentage/fraction "of" a number), then Division and Multiplication (left to right, same priority), then Addition and Subtraction (left to right, same priority). Most errors on this topic don't come from not knowing BODMAS — they come from doing multiplication before division just because it's listed first, when actually they're equal-priority and done left-to-right in the order they appear.

Worked example: "12 + 8 × 2 - 6" — brackets: none. Multiplication/division first: 8×2=16. Now the expression is 12+16-6. Addition/subtraction left to right: 12+16=28, then 28-6=22. A common mistake is doing 12+8 first because it's the leftmost operation — but multiplication always outranks addition regardless of position. For fractions, convert to a common denominator before adding/subtracting, and cancel common factors before multiplying across rather than multiplying first and simplifying a bigger number afterward — this alone cuts calculation time substantially under exam pressure.`,
  method:[
    "Apply BODMAS strictly: Brackets → Of → Division → Multiplication → Addition → Subtraction.",
    "Convert decimals to fractions when it simplifies calculation (0.25 = 1/4).",
    "For 'approximately equal to' questions, round each number to the nearest convenient value BEFORE calculating, not after.",
    "Simplify fractions by cancelling common factors before multiplying across."
  ],
  tricks:[
    "Learn squares up to 30 and cubes up to 15 by heart — this alone saves huge time in simplification and number system.",
    "For expressions with many fractions, find the LCM once and convert everything, rather than solving pairwise.",
    "In 'find the value close to' type MCQs, eliminate 2 obviously wrong options by rough estimation before precise calculation."
  ],

{
  id:"numsystem", label:"Number System",
  theory:`Number system covers the structural properties of numbers themselves — divisibility, factors, primes, and remainders — rather than solving an expression. Most questions reduce to applying a memorized rule quickly, so the real skill is knowing the rules cold, not deriving them each time.

Divisibility rules let you check if a number divides evenly without doing full division: a number is divisible by 3 if its digit sum is divisible by 3; by 9 if digit sum is divisible by 9; by 11 if the alternating sum of digits (add-subtract-add-subtract) is divisible by 11; by 4 if its last two digits form a number divisible by 4. HCF (highest common factor) is the largest number that divides two numbers exactly; LCM (lowest common multiple) is the smallest number that both numbers divide into exactly. A critical shortcut: for any two numbers, HCF × LCM = the product of the two numbers — this lets you find one if you already know the other three values, without factorizing again.

Worked example: "HCF of two numbers is 4, their product is 96, find LCM." Using the shortcut: HCF × LCM = Product, so LCM = Product ÷ HCF = 96 ÷ 4 = 24. Without the shortcut you'd have to find the actual two numbers and compute LCM manually — far slower. For divisibility-by-11 checks on a number like 2145: alternate the digits with + and − signs from right to left: 5-4+1-2 = 0, and since 0 is divisible by 11, so is 2145.`,

{
  id:"percentage", label:"Percentage",
  theory:`Percentage means "out of 100" — it's a standardized way to compare parts to wholes. Nearly every percentage question is one of three question-shapes: finding what percent one number is of another, finding a number given its percentage, or finding percentage change (increase/decrease) between two values.

The formula for "X is what percent of Y" is (X/Y)×100. The formula for percentage change is (change/original value)×100 — and the critical detail people get wrong is that the denominator is always the ORIGINAL value, never the new one. So if a price rises from 80 to 100, the increase is 20, and the percentage increase is (20/80)×100 = 25%, NOT (20/100)×100. A separate case is successive percentage change (e.g., price increases 10% then decreases 10%) — the net change is NOT zero. The formula is: net% = a + b + (ab/100), using negative values for decreases. For a 10% increase followed by a 10% decrease: 10 + (-10) + (10×-10/100) = -1%, meaning a net 1% decrease — the two 10%s don't cancel because the second 10% is calculated on a different (larger) base than the first.

Worked example: "A number increased from 80 to 100 — find percentage increase." Change = 100-80 = 20. Original = 80. Percentage increase = (20/80)×100 = 25%. The fastest way to build speed here is memorizing fraction-to-percent equivalents (1/2=50%, 1/4=25%, 1/8=12.5%, 1/3=33.33%) so you can convert instantly instead of doing long division under time pressure.`,

The subject splits into three recurring buckets. Physics facts center on SI units (Force=Newton, Current=Ampere, Power=Watt) and basic laws (sound needs a medium and travels fastest through solids, light travels fastest in vacuum). Chemistry facts center on common compounds and their formulas (water=H2O, table salt=NaCl) and basic properties like pH (below 7 is acidic, above 7 is basic, 7 is neutral). Biology facts center on human body systems — which organ does what, which vitamin deficiency causes which disease, and basic cell biology like the fact that mitochondria produce a cell's energy.

Because this is pure recall rather than reasoning, the only "trick" that actually works is spaced repetition: short, frequent review sessions beat one long session, because recognition fades faster than it feels like it will. A second real technique is building one-line fact cards instead of paragraphs — "SI unit of force = Newton" recalls faster under exam pressure than a paragraph explaining what force is. Group facts by system (all digestive-system facts together, all SI units together) so a question about one fact doesn't get confused with a similar-sounding fact from an unrelated system.`,

// ---------- STATE ----------
let stats = JSON.parse(localStorage.getItem('sscStats') || '{}');
function saveStats(){ localStorage.setItem('sscStats', JSON.stringify(stats)); }
function getTopicStats(id){ if(!stats[id]) stats[id]={answered:0,correct:0}; return stats[id]; }

function updateScorebar(){
  let answered=0, correct=0;
  Object.values(stats).forEach(s=>{answered+=s.answered; correct+=s.correct;});
  document.getElementById('totalAnswered').textContent=answered;
  document.getElementById('totalCorrect').textContent=correct;
  document.getElementById('totalAcc').textContent= answered? Math.round(correct/answered*100)+'%':'0%';
}

// ---------- NAV ----------
const nav = document.getElementById('nav');
const main = document.getElementById('main');

topics.forEach(t=>{
  const b=document.createElement('button');
  b.textContent=t.label;
  b.onclick=()=>showTopic(t.id);
  b.id='nav-'+t.id;
  nav.appendChild(b);
});

function showTopic(id){
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+id).classList.add('active');
  const t = topics.find(x=>x.id===id);
  main.innerHTML='';
  if(t.isPlan){ renderPlan(); return; }
  renderTopic(t);
}

function renderPlan(){
  const plan = [
    {day:"Monday",blocks:["Hour 1: Analogy — theory + tricks video","Hour 1.5-2: Analogy — 8-9 practice Qs","Last 30 min: English grammar block"]},
    {day:"Tuesday",blocks:["Hour 1: Analogy remaining Qs + review mistakes","Hour 1.5-2: Classification — theory + tricks","Last 30 min: English vocab block"]},
    {day:"Wednesday",blocks:["Hour 1-2: Classification — full practice set","Hour 1.5-2: Series — theory + tricks","Last 30 min: English PYQ block"]},
    {day:"Thursday",blocks:["Hour 1-2: Series — full practice set","Hour 1.5-2: Alphabet Series — theory + tricks","Last 30 min: English revision"]},
    {day:"Friday",blocks:["Hour 1-2: Alphabet Series — full practice set","Hour 1.5-2: Simplification — theory + tricks","Last 30 min: GA Science — daily facts"]},
    {day:"Saturday",blocks:["Block 1 (2h): Simplification practice + weak-area redo","Block 2 (2h): Number System — theory + tricks + practice","Block 3 (1.5h): Percentage — theory + tricks","Block 4 (1.5h): Percentage — practice"]},
    {day:"Sunday",blocks:["Block 1 (2h): Redo every wrong reasoning answer from Mon-Fri","Block 2 (2h): Redo every wrong quant answer","Block 3 (1.5h): English full PYQ set, timed","Block 4 (1.5h): GA — consolidate week's notes + quick quiz"]}
  ];
  let html = '<div class="card"><h2>Week 1 Hourly Plan</h2><p class="note">Non-negotiable: log every wrong answer and redo it Sunday. Skipping the Sunday redo wastes the whole week&#39;s data.</p>';
  plan.forEach(d=>{
    html += `<h3>${d.day}</h3><ul>`;
    d.blocks.forEach(b=> html += `<li>${b}</li>`);
    html += '</ul>';
  });
  html += '</div>';
  main.innerHTML = html;
}

function renderTopic(t){
  let html = `<div class="card"><h2>${t.label} — Theory</h2><p>${t.theory}</p>`;
  html += `<h3>How to Solve</h3><ol>`;
  t.method.forEach(m=> html += `<li>${m}</li>`);
  html += `</ol>`;
  html += `<h3>Tricks</h3>`;
  t.tricks.forEach(tr=> html += `<div class="trick">💡 ${tr}</div>`);
  html += `<div class="yt">📺 <b>Learn deeper on YouTube:</b> ${t.yt}</div>`;
  html += `</div>`;

  html += `<div class="card"><h2>Practice — ${t.questions.length} Questions</h2>`;
  html += `<p class="note">Practice set modeled on PYQ patterns and difficulty level — not verbatim reproduced exam questions.</p>`;
  t.questions.forEach((q,i)=>{
    html += `<div class="qbox" id="${t.id}-q${i}">
      <div class="qhead"><span>Q${i+1}</span><span class="tag">${t.label}</span></div>
      <div class="qtext">${q.q}</div>`;
    q.o.forEach((opt,oi)=>{
      html += `<button class="opt" onclick="answerQ('${t.id}',${i},${oi})">${String.fromCharCode(65+oi)}. ${opt}</button>`;
    });
    html += `<div class="explain" id="${t.id}-exp${i}">${q.e}</div></div>`;
  });
  html += `</div>`;
  main.innerHTML = html;
}

function answerQ(topicId, qi, choiceIdx){
  const t = topics.find(x=>x.id===topicId);
  const q = t.questions[qi];
  const box = document.getElementById(topicId+'-q'+qi);
  if(box.dataset.answered) return;
  box.dataset.answered = "1";
  const opts = box.querySelectorAll('.opt');
  opts.forEach((o,oi)=>{
    o.disabled = true;
    if(oi===q.a) o.classList.add('correct');
    else if(oi===choiceIdx) o.classList.add('wrong');
  });
  document.getElementById(topicId+'-exp'+qi).style.display='block';
  const s = getTopicStats(topicId);
  s.answered++;
  if(choiceIdx===q.a) s.correct++;
  saveStats();
  updateScorebar();
}

showTopic('plan');
updateScorebar();
</script>
