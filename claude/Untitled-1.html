<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSC CGL 2026 — Modern Prep System</title>
<style>
:root{
  --bg:#08090d;--bg1:#0d0f1a;--bg2:#111420;--bg3:#171a28;
  --b0:#1a1d2e;--b1:#252840;--b2:#333660;
  --t0:#e8eaf6;--t1:#9095b0;--t2:#4a4f6a;
  --blue:#4361ee;--blue2:#2d44b8;--blue-bg:#0a0f2a;
  --teal:#14b8a6;--teal-bg:#031a18;
  --amber:#f59e0b;--amber-bg:#1a1200;
  --red:#ef4444;--red-bg:#1a0505;
  --purple:#7c3aed;--purple-bg:#110a1f;
  --green:#22c55e;--green-bg:#031209;
  --cyan:#06b6d4;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t0);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;line-height:1.6;font-size:14px;min-height:100vh;overflow-x:hidden}
/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#0a0c1e 0%,#0d0f1a 100%);border-bottom:1px solid var(--b0);padding:.9rem 1.25rem;position:sticky;top:0;z-index:200}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.hdr-title{font-size:.95rem;font-weight:700;background:linear-gradient(90deg,#4361ee,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.countdown{display:flex;align-items:center;gap:6px;background:var(--red-bg);border:1px solid #3a0a0a;padding:4px 12px;border-radius:20px}
.countdown-n{font-size:1.1rem;font-weight:700;color:var(--red);line-height:1}
.countdown-l{font-size:.65rem;color:#c87878;text-transform:uppercase;letter-spacing:.05em}
.hdr-row2{display:flex;gap:8px;flex-wrap:wrap}
.hchip{padding:2px 10px;border-radius:20px;font-size:.68rem;font-weight:500;border:1px solid;display:inline-flex;align-items:center;gap:4px}
/* ── TABS ── */
.tabs-wrap{background:var(--bg1);border-bottom:1px solid var(--b0);overflow-x:auto;position:sticky;top:66px;z-index:150}
.tabs-wrap::-webkit-scrollbar{height:2px}
.tabs-wrap::-webkit-scrollbar-track{background:var(--bg1)}
.tabs-wrap::-webkit-scrollbar-thumb{background:var(--blue)}
.tabs{display:flex;min-width:max-content;padding:0 1rem}
.tb{padding:9px 15px;font-size:.73rem;font-weight:500;color:var(--t2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;letter-spacing:.02em}
.tb:hover{color:var(--t1)}
.tb.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
/* ── CONTENT ── */
.content{min-height:100vh;padding:1.25rem;max-width:960px;margin:0 auto}
.sec{display:none;animation:fadeIn .25s ease}
.sec.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* ── TYPOGRAPHY ── */
.sec-head{font-size:1.1rem;font-weight:700;color:var(--t0);margin-bottom:.25rem}
.sec-sub{font-size:.78rem;color:var(--t2);margin-bottom:1.25rem}
.sub-head{font-size:.82rem;font-weight:600;color:var(--t0);margin:1.25rem 0 .6rem;display:flex;align-items:center;gap:8px;padding-bottom:7px;border-bottom:1px solid var(--b0)}
/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.75rem;transition:border-color .2s}
.card:hover{border-color:var(--b1)}
.card-title{font-size:.82rem;font-weight:600;color:var(--t0);margin-bottom:4px}
.card-body{font-size:.77rem;color:var(--t1);line-height:1.65}
/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
/* ── STAT CARDS ── */
.stat-c{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;padding:.75rem;text-align:center}
.stat-n{font-size:1.6rem;font-weight:700;line-height:1}
.stat-l{font-size:.66rem;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:.66rem;font-weight:600;border:1px solid}
.b-blue{color:var(--blue);border-color:var(--blue2);background:var(--blue-bg)}
.b-teal{color:var(--teal);border-color:#0a3530;background:var(--teal-bg)}
.b-amber{color:var(--amber);border-color:#2a1e00;background:var(--amber-bg)}
.b-red{color:var(--red);border-color:#3a0a0a;background:var(--red-bg)}
.b-purple{color:var(--purple);border-color:#200a3e;background:var(--purple-bg)}
.b-green{color:var(--green);border-color:#062010;background:var(--green-bg)}
/* ── FORMULA CARDS ── */
.fbox{background:var(--bg3);border-left:3px solid var(--blue);padding:6px 11px;border-radius:0 6px 6px 0;margin:5px 0;font-size:.76rem;color:var(--cyan);font-family:'Courier New',monospace;line-height:1.7}
.fcard{background:var(--bg2);border:1px solid var(--b0);border-radius:8px;padding:.8rem 1rem;margin-bottom:.6rem}
.ftopic{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem}
/* ── PRIORITY ── */
.pri-row{display:flex;align-items:center;gap:10px;padding:.6rem .9rem;border-radius:8px;margin-bottom:.45rem;font-size:.78rem}
.pri-vhigh{background:#0f0506;border:1px solid #3a0a0a}
.pri-high{background:#0f0a00;border:1px solid #3a2800}
.pri-med{background:#000d08;border:1px solid #0a2e1a}
.pri-low{background:#0a0a12;border:1px solid var(--b0)}
.pri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pri-name{font-weight:600;min-width:160px;font-size:.8rem}
.pri-meta{font-size:.7rem;color:var(--t2);margin-left:auto}
/* ── SPEED CARDS ── */
.speed-card{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;padding:1rem;text-align:center;position:relative;overflow:hidden}
.speed-topic{font-size:.75rem;font-weight:600;color:var(--t0);margin-bottom:6px}
.speed-time{font-size:1.5rem;font-weight:700;color:var(--teal);line-height:1}
.speed-unit{font-size:.65rem;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.speed-bar{width:100%;height:3px;background:var(--b0);border-radius:2px;margin-top:.6rem;overflow:hidden}
.speed-fill{height:3px;border-radius:2px;transition:width 1s ease}
.speed-btn{margin-top:.6rem;font-size:.68rem;padding:3px 10px;border:1px solid var(--b1);border-radius:20px;background:transparent;color:var(--teal);cursor:pointer}
/* ── SHORTCUT CARDS ── */
.sc-card{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;padding:1rem;margin-bottom:.65rem}
.sc-see{font-size:.8rem;color:var(--t2);margin-bottom:4px}
.sc-pattern{font-size:.88rem;font-weight:600;color:var(--amber);font-family:'Courier New',monospace;margin-bottom:4px}
.sc-arrow{font-size:.7rem;color:var(--t2);margin-bottom:4px}
.sc-answer{font-size:.88rem;font-weight:700;color:var(--green);font-family:'Courier New',monospace;margin-bottom:.5rem}
.sc-time{font-size:.68rem;color:var(--teal);padding:2px 8px;background:var(--teal-bg);border:1px solid #0a3530;border-radius:20px;display:inline-block}
/* ── SKIP RULE CARDS ── */
.skip-card{background:var(--red-bg);border:1px solid #3a0a0a;border-radius:10px;padding:.8rem 1rem;margin-bottom:.6rem;display:flex;align-items:center;gap:10px}
.skip-icon{font-size:1.2rem;flex-shrink:0}
.skip-text{font-size:.8rem;color:#e87878;line-height:1.5}
.skip-text strong{color:var(--red)}
/* ── ROADMAP ── */
.day-card{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;padding:.9rem 1rem;margin-bottom:.6rem;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:border-color .2s}
.day-card:hover{border-color:var(--b1)}
.day-card.done{border-color:var(--green);background:#031209}
.day-num{background:var(--blue-bg);border:1px solid var(--blue2);color:var(--blue);font-size:.72rem;font-weight:700;padding:4px 9px;border-radius:6px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.day-num.weekend{background:var(--purple-bg);border-color:#300a5e;color:var(--purple)}
.day-body{flex:1}
.day-name{font-size:.85rem;font-weight:600;color:var(--t0);margin-bottom:3px}
.day-topics{font-size:.75rem;color:var(--teal);margin-bottom:4px}
.day-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:.68rem;color:var(--t2)}
.day-meta span{padding:1px 7px;background:var(--bg3);border:1px solid var(--b0);border-radius:20px}
.day-check{width:20px;height:20px;border:2px solid var(--b1);border-radius:50%;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--green);transition:all .2s}
.day-card.done .day-check{background:var(--green);border-color:var(--green);color:#000}
/* ── MOCK TEST ── */
.mock-head{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid var(--b0);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:1rem}
.mock-timer{font-size:1.4rem;font-weight:700;font-family:'Courier New',monospace;color:var(--green);letter-spacing:.05em}
.mock-timer.warn{color:var(--amber)}
.mock-timer.danger{color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.mock-progress{flex:1;margin:0 1.5rem}
.mock-prog-bar{height:6px;background:var(--b0);border-radius:3px;overflow:hidden;margin-top:4px}
.mock-prog-fill{height:6px;background:var(--blue);border-radius:3px;transition:width .3s}
.mock-score-display{font-size:.78rem;color:var(--t2)}
.mock-q{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;margin-bottom:.6rem;overflow:hidden;transition:border-color .2s}
.mock-q-top{padding:.8rem 1rem;display:flex;gap:10px;align-items:flex-start}
.mock-q-num{background:var(--blue-bg);border:1px solid var(--blue2);color:var(--blue);font-size:.68rem;font-weight:700;min-width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.mock-q-txt{font-size:.82rem;color:var(--t0);flex:1;line-height:1.6}
.mock-options{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 1rem .9rem}
.mock-opt{padding:6px 12px;border:1px solid var(--b0);border-radius:7px;font-size:.78rem;color:var(--t1);cursor:pointer;background:var(--bg3);transition:all .18s;text-align:left}
.mock-opt:hover{border-color:var(--b1);color:var(--t0);background:var(--bg2)}
.mock-opt.selected{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.mock-opt.correct{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.mock-opt.wrong{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.mock-exp{background:var(--teal-bg);border-top:1px solid #0a3530;padding:.7rem 1rem;font-size:.76rem;color:#6de8d0;line-height:1.65;display:none}
.mock-exp.show{display:block}
.mock-tag{font-size:.62rem;padding:1px 7px;border-radius:20px;background:var(--bg3);border:1px solid var(--b1);color:var(--t2)}
.mock-diff{font-size:.62rem;padding:1px 7px;border-radius:20px;font-weight:600}
.mock-diff.e{background:#031209;color:var(--green);border:1px solid #062010}
.mock-diff.m{background:var(--amber-bg);color:var(--amber);border:1px solid #2a1e00}
.mock-diff.h{background:var(--red-bg);color:var(--red);border:1px solid #3a0a0a}
.submit-btn{width:100%;padding:.8rem;background:var(--blue);border:none;border-radius:8px;color:#fff;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:.5rem}
.submit-btn:hover{background:var(--blue2)}
.submit-btn:disabled{background:var(--b1);color:var(--t2);cursor:not-allowed}
.score-card{background:linear-gradient(135deg,var(--blue-bg),var(--purple-bg));border:1px solid var(--blue2);border-radius:12px;padding:1.5rem;text-align:center;margin-bottom:1rem}
.score-big{font-size:3rem;font-weight:700;background:linear-gradient(90deg,var(--blue),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.score-total{font-size:1rem;color:var(--t2);margin-bottom:.5rem}
.score-grade{font-size:.88rem;font-weight:600;margin-top:.4rem}
/* ── DASHBOARD ── */
.dash-stat{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;padding:1rem;text-align:center}
.dash-n{font-size:2rem;font-weight:700;line-height:1}
.dash-l{font-size:.68rem;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.acc-bar{height:10px;background:var(--b0);border-radius:5px;margin-top:.5rem;overflow:hidden}
.acc-fill{height:10px;border-radius:5px;transition:width 1s ease}
.topic-bar{margin-bottom:.5rem}
.topic-label{display:flex;justify-content:space-between;font-size:.74rem;color:var(--t1);margin-bottom:3px}
.topic-bg{height:6px;background:var(--b0);border-radius:3px;overflow:hidden}
.topic-fill{height:6px;border-radius:3px}
/* ── REASONING CARDS ── */
.reas-card{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;padding:.9rem 1rem;margin-bottom:.6rem;border-left:3px solid var(--purple)}
.reas-topic{font-size:.85rem;font-weight:600;color:var(--t0);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.reas-target{font-size:.68rem;color:var(--purple);background:var(--purple-bg);padding:2px 8px;border-radius:20px;border:1px solid #200a3e}
.reas-tip{font-size:.76rem;color:var(--t1);line-height:1.6}
/* ── PROGRESS TRACKER (sticky bottom) ── */
.prog-bar-wrap{position:fixed;bottom:0;left:0;right:0;background:var(--bg1);border-top:1px solid var(--b0);padding:.5rem 1.25rem;display:flex;align-items:center;gap:12px;z-index:300;font-size:.72rem}
.prog-label{color:var(--t2);white-space:nowrap}
.prog-bg{flex:1;height:6px;background:var(--b0);border-radius:3px;overflow:hidden;max-width:200px}
.prog-fill{height:6px;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:3px;transition:width .5s ease}
.prog-pct{color:var(--teal);font-weight:600;white-space:nowrap}
.prog-solved{color:var(--t1);margin-left:auto;white-space:nowrap}
/* ── COMPARISON TABLE ── */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1rem 0}
.cmp-old{background:#0f0505;border:1px solid #3a0a0a;border-radius:10px;padding:1rem}
.cmp-new{background:var(--teal-bg);border:1px solid #0a3530;border-radius:10px;padding:1rem}
.cmp-hd{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.8rem}
.cmp-step{display:flex;gap:8px;align-items:flex-start;margin-bottom:.5rem;font-size:.78rem}
.cmp-step-n{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0;margin-top:1px}
/* ── TREND CARDS ── */
.trend-card{background:var(--bg2);border:1px solid var(--b0);border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:10px;font-size:.78rem}
.trend-icon{font-size:1.1rem;flex-shrink:0}
.trend-txt{color:var(--t1)}
.trend-txt strong{color:var(--t0)}
/* ── TIP BOX ── */
.tip{background:var(--amber-bg);border-left:3px solid var(--amber);padding:.65rem 1rem;border-radius:0 8px 8px 0;margin:.75rem 0;font-size:.77rem;color:#d4900a;line-height:1.6}
.tip strong{color:var(--amber)}
.alert-g{background:var(--teal-bg);border-left:3px solid var(--teal);padding:.65rem 1rem;border-radius:0 8px 8px 0;margin:.75rem 0;font-size:.77rem;color:var(--teal);line-height:1.6}
/* ── PRACTICE Qs ── */
.pq-filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.pq-filter{padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:600;border:1px solid var(--b1);background:var(--bg3);color:var(--t2);cursor:pointer;transition:all .2s}
.pq-filter.on{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}
.pq-card{background:var(--bg2);border:1px solid var(--b0);border-radius:10px;margin-bottom:.75rem;overflow:hidden;transition:border-color .2s}
.pq-card.answered-correct{border-color:var(--green)}
.pq-card.answered-wrong{border-color:var(--red)}
.pq-top{padding:.85rem 1rem .6rem;display:flex;gap:10px;align-items:flex-start}
.pq-num{min-width:26px;height:26px;border-radius:50%;background:var(--blue-bg);border:1px solid var(--blue2);color:var(--blue);font-size:.68rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.pq-num.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.pq-num.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.pq-q{font-size:.82rem;color:var(--t0);flex:1;line-height:1.65}
.pq-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:0 1rem .9rem}
.pq-opt{padding:7px 12px;border:1px solid var(--b0);border-radius:7px;font-size:.78rem;color:var(--t1);cursor:pointer;background:var(--bg3);transition:all .18s;text-align:left}
.pq-opt:hover:not(:disabled){border-color:var(--b1);color:var(--t0);background:var(--bg2)}
.pq-opt.selected{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.pq-opt.correct-ans{border-color:var(--green);color:var(--green);background:var(--green-bg)}
.pq-opt.wrong-ans{border-color:var(--red);color:var(--red);background:var(--red-bg)}
.pq-opt:disabled{cursor:default}
.pq-explain{background:var(--teal-bg);border-top:1px solid #0a3530;padding:.7rem 1rem;font-size:.76rem;color:#6de8d0;line-height:1.65;display:none}
.pq-explain.show{display:block}
.pq-reveal-btn{margin:0 1rem .85rem;padding:5px 14px;border:1px solid var(--b1);border-radius:20px;background:transparent;color:var(--teal);font-size:.7rem;cursor:pointer;transition:border-color .2s}
.pq-reveal-btn:hover{border-color:var(--teal)}
.pq-score-strip{background:var(--bg3);border:1px solid var(--b0);border-radius:8px;padding:.7rem 1rem;margin-bottom:1rem;display:flex;gap:16px;align-items:center;flex-wrap:wrap;font-size:.75rem}
.pq-score-n{font-size:1.3rem;font-weight:700}
/* ── RESPONSIVE ── */
@media(max-width:600px){
  .g2,.g3,.g4,.cmp-grid{grid-template-columns:1fr}
  .mock-options{grid-template-columns:1fr}
  .pq-opts{grid-template-columns:1fr}
  .hdr-row2{display:none}
  .tabs-wrap{top:52px}
}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-row1">
    <div class="hdr-title">⚡ SSC CGL 2026 — Modern Prep System</div>
    <div class="countdown">
      <div><div class="countdown-n" id="daysLeft">105</div><div class="countdown-l">Days Left</div></div>
    </div>
  </div>
  <div class="hdr-row2">
    <span class="hchip b-red">🎯 Exam: Sep 26, 2026</span>
    <span class="hchip b-blue">📅 Week 1 of 17</span>
    <span class="hchip b-amber">⚠️ −0.5 negative marking</span>
    <span class="hchip b-teal">🌙 Dark Mode</span>
    <span class="hchip b-green">✅ Based on 2024–25 actual patterns</span>
  </div>
</header>
<nav class="tabs-wrap">
  <div class="tabs" id="tabRow"></div>
</nav>
<main class="content" id="content"></main>
<div class="prog-bar-wrap">
  <span class="prog-label">Week 1 Progress</span>
  <div class="prog-bg"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
  <span class="prog-pct" id="progPct">0%</span>
  <span class="prog-solved" id="progSolved">0 of 135 Qs answered</span>
</div>
<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════

const TABS = [
  {id:'reality',label:'🚀 Reality Check'},
  {id:'roadmap',label:'📅 Week 1 Plan'},
  {id:'priority',label:'🎯 Priority'},

function toggleDay(i) {
  const card = el('day-'+i);
  const check = el('day-check-'+i);
  if (state.daysCompleted.has(i)) {
    state.daysCompleted.delete(i);
    card.classList.remove('done');
  } else {
    state.daysCompleted.add(i);
    card.classList.add('done');
  }
  el('wd-done').textContent = state.daysCompleted.size;
  updateProgressBar();
}

function startMock() {
  state.mockStarted = true;
  state.mockAnswers = {};
  state.mockSubmitted = false;
  renderAll();
  switchTab('mock');
  startMockTimer();
}

function startMockTimer() {
  if (state.mockTimer) clearInterval(state.mockTimer);
  state.mockSecondsLeft = 900;
  state.mockTimer = setInterval(() => {
    state.mockSecondsLeft--;
    const mins = Math.floor(state.mockSecondsLeft / 60);
    const secs = state.mockSecondsLeft % 60;
    const timerEl = el('mockTimer');
    if (timerEl) {
      timerEl.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      timerEl.className = 'mock-timer';
      if (state.mockSecondsLeft <= 60) timerEl.className += ' danger';
      else if (state.mockSecondsLeft <= 180) timerEl.className += ' warn';
    }
    if (state.mockSecondsLeft <= 0) {
      clearInterval(state.mockTimer);
      submitMock();
    }
  }, 1000);
}

function selectAns(qi, oi) {
  if (state.mockSubmitted) return;
  state.mockAnswers[qi] = oi;
  // Update button states
  const q = MOCK_QS[qi];
  q.opts.forEach((opt, i) => {
    const btn = el(`mo-${qi}-${i}`);
    if (btn) {
      btn.className = 'mock-opt';
      if (i === oi) btn.className += ' selected';
    }
  });
  // Update progress
  const answered = Object.keys(state.mockAnswers).length;
  const progEl = el('mockProgress');
  const fillEl = el('mockProgFill');
  if (progEl) progEl.textContent = `${answered}/25`;
  if (fillEl) fillEl.style.width = `${answered/25*100}%`;
  updateProgress(0);
}

function submitMock() {
  if (state.mockTimer) clearInterval(state.mockTimer);
  state.mockSubmitted = true;
  // Calculate score
  let correct = 0, wrong = 0;
  MOCK_QS.forEach((q,i) => {
    if (state.mockAnswers[i] !== undefined) {
      if (state.mockAnswers[i] === q.ans) correct++;
      else wrong++;
    }
  });
  state.mockScore = Math.max(state.mockScore, correct * 2 - wrong * 0.5);
  state.totalAnswered += 25;
  renderAll();
  switchTab('mock');
  updateProgressBar();
}

function resetMock() {
  state.mockStarted = false;
  state.mockSubmitted = false;
  state.mockAnswers = {};
  if (state.mockTimer) clearInterval(state.mockTimer);
  renderAll();
  switchTab('mock');
}

let speedIntervals = {};
function startSpeedTimer(topic, seconds, btn) {
  const key = topic.replace(/\W/g,'');
  const dispEl = el('st-'+key);
  if (!dispEl) return;
  if (speedIntervals[key]) {
    clearInterval(speedIntervals[key]);
    dispEl.textContent = '';
    btn.textContent = 'Start Timer';
    delete speedIntervals[key];
    return;
  }
  let remaining = seconds;
  btn.textContent = 'Stop';
  dispEl.textContent = `${remaining}s`;
  speedIntervals[key] = setInterval(() => {
    remaining--;
    if (remaining > 0) {
      dispEl.textContent = `${remaining}s`;
    } else {
      dispEl.textContent = '⏰ TIME UP!';
      btn.textContent = 'Start Timer';
      clearInterval(speedIntervals[key]);
      delete speedIntervals[key];
    }
  }, 1000);
}

function updateProgressBar() {
  const total = 135;
  const pct = Math.min(100, Math.round(state.totalAnswered / total * 100));
  const fillEl = el('progFill');
  const pctEl = el('progPct');
  const solvedEl = el('progSolved');
  if (fillEl) fillEl.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '%';
  if (solvedEl) solvedEl.textContent = `${state.totalAnswered} of ${total} Qs answered`;
}

function updateProgress(delta) {
  updateProgressBar();
}

function renderAll() {
  const content = el('content');
  const tabs = el('tabRow');
  // Render tabs
  tabs.innerHTML = TABS.map(t =>
    `<button class="tb${state.tab===t.id?' on':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
  // Render current section
  const renderer = RENDERERS[state.tab];
  if (renderer) {
    content.innerHTML = `<div class="sec on" id="sec-${state.tab}">${renderer()}</div>`;
    // Re-bind roadmap toggle clicks
    if (state.tab === 'roadmap') {
      state.daysCompleted.forEach(i => {
        const card = el('day-'+i);
        const check = el('day-check-'+i);
        if (card) card.classList.add('done');
      });
    }
    // Re-bind speed bar animations
    if (state.tab === 'speed') {
      setTimeout(() => {
        document.querySelectorAll('.speed-fill').forEach(el => {
          el.style.transition = 'width 1s ease';
        });
      }, 100);
    }
  }
}

function switchTab(id) {
  state.tab = id;
  renderAll();
  window.scrollTo({top:0,behavior:'smooth'});
}
